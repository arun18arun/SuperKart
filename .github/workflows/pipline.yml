name: SuperKart Pipeline

on:
workflow_dispatch:

jobs:

register-dataset:
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v3

```
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      pip install --upgrade pip
      pip install -r SuperKart_project/requirements.txt

  - name: Upload Dataset to Hugging Face
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: python SuperKart_project/model_building/data_register.py
```

data-prep:
needs: register-dataset
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v3

```
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      pip install --upgrade pip
      pip install -r SuperKart_project/requirements.txt

  - name: Run Data Preparation
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: python SuperKart_project/model_building/prep.py
```

model-training:
needs: data-prep
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v3

```
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      pip install --upgrade pip
      pip install -r SuperKart_project/requirements.txt

  - name: Train Model
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: python SuperKart_project/model_building/train.py
```

deploy-hosting:
needs: model-training
runs-on: ubuntu-latest
steps:
- name: Checkout Code
uses: actions/checkout@v3

```
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install Dependencies
    run: |
      pip install --upgrade pip
      pip install -r SuperKart_project/requirements.txt

  - name: Deploy to Hugging Face Space
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: python SuperKart_project/hosting/hosting.py
```
